<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Air Control</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="container">

<div class="header">
<h1>🌡 Smart Air Control</h1>
<p>Room Monitoring System</p>
</div>
<div class="gateway-box" id="gatewayBox">
  <h2>🌡 อุณหภูมิห้องขณะนี้</h2>
  <div class="gateway-temp">
    <span id="temp_gateway">--</span> 
  </div>
</div><br>
<div class="rooms">

<div class="room" id="air1">
<h2>ตัวที่ 1 (R1)</h2>

<div class="control-group">
  <span class="label">LED 1:</span>
  <span id="led1" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R1|LED1_ON')">ON</button>
    <button class="off" onclick="sendCmd('R1|LED1_OFF')">OFF</button>
  </div>
</div>

<div class="control-group">
  <span class="label">LED 2:</span>
  <span id="led2" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R1|LED2_ON')">ON</button>
    <button class="off" onclick="sendCmd('R1|LED2_OFF')">OFF</button>
  </div>
</div>

<div class="control-group">
  <span class="label">LED 3:</span>
  <span id="led3" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R1|LED3_ON')">ON</button>
    <button class="off" onclick="sendCmd('R1|LED3_OFF')">OFF</button>
  </div>
</div>

<div class="control-group">
  <span class="label">LED 4:</span>
  <span id="led4" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R1|LED4_ON')">ON</button>
    <button class="off" onclick="sendCmd('R1|LED4_OFF')">OFF</button>
  </div>
</div>

<div class="temp" id="temp_r1">-- °C</div>
</div>

<div class="room" id="air2">
<h2>ตัวที่ 2 (R2)</h2>

<div class="control-group">
  <span class="label">LED 1:</span>
  <span id="r2_led1" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R2|LED1_ON')">ON</button>
    <button class="off" onclick="sendCmd('R2|LED1_OFF')">OFF</button>
  </div>
</div>

<div class="control-group">
  <span class="label">LED 2:</span>
  <span id="r2_led2" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R2|LED2_ON')">ON</button>
    <button class="off" onclick="sendCmd('R2|LED2_OFF')">OFF</button>
  </div>
</div>

<div class="control-group">
  <span class="label">LED 3:</span>
  <span id="r2_led3" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R2|LED3_ON')">ON</button>
    <button class="off" onclick="sendCmd('R2|LED3_OFF')">OFF</button>
  </div>
</div>

<div class="control-group">
  <span class="label">LED 4:</span>
  <span id="r2_led4" class="status">⚪ OFF</span>
  <div class="btns">
    <button class="on" onclick="sendCmd('R2|LED4_ON')">ON</button>
    <button class="off" onclick="sendCmd('R2|LED4_OFF')">OFF</button>
  </div>
</div>

<div class="temp" id="temp_r2">-- °C</div>
</div>

</div>

<div class="footer">
<br>
<div id="status">🔄 Connecting MQTT...</div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
