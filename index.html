<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>Smart Air Control</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.container{
width:90%;
max-width:1200px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:38px;
}

.header p{
color:#cbd5e1;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-top:0;
text-align:center;
}

.status-led{
display:block;
text-align:center;
font-size:24px;
margin:15px 0;
font-weight:bold;
}

.temp-display{
display:block;
text-align:center;
font-size:32px;
margin:20px 0;
font-weight:bold;
color:#fbbf24;
}

.btn-group{
display:flex;
gap:10px;
}

button{
flex:1;
border:none;
border-radius:12px;
padding:14px;
font-size:16px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.on{
background:#22c55e;
color:white;
}

.off{
background:#ef4444;
color:white;
}

.footer{
margin-top:25px;
text-align:center;
}

#status{
display:inline-block;
padding:10px 20px;
border-radius:50px;
background:#1e293b;
font-weight:bold;
}

</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

</head>

<body>

<div class="container">

<div class="header">
<h1>🌡️ Smart Air Control</h1>
<p>ESP32 + MQTT + LoRa Dashboard</p>
</div>

<div class="grid">

<!-- R1 LED1 -->

<div class="card">
<h2>R1 LED1</h2>

<span id="led1" class="status-led">
⚪ Unknown
</span>

<div class="btn-group">
<button class="on" onclick="sendCmd('R1|LED1_ON')">ON</button>
<button class="off" onclick="sendCmd('R1|LED1_OFF')">OFF</button>
</div>
</div>

<!-- R1 LED2 -->

<div class="card">
<h2>R1 LED2</h2>

<span id="led2" class="status-led">
⚪ Unknown
</span>

<div class="btn-group">
<button class="on" onclick="sendCmd('R1|LED2_ON')">ON</button>
<button class="off" onclick="sendCmd('R1|LED2_OFF')">OFF</button>
</div>
</div>

<!-- R1 TEMP -->

<div class="card">
<h2>🌡 R1 Temperature</h2>

<span id="temp_r1" class="temp-display">
-- °C
</span>

<p style="text-align:center;color:#cbd5e1;">
DS18B20 Sensor
</p>
</div>

<!-- R2 OUTPUT -->
<br>
<div class="card">
<h2>R2 Output</h2>

<span id="r2" class="status-led">
⚪ Unknown
</span>

<div class="btn-group">
<button class="on" onclick="sendCmd('R2|ON')">ON</button>
<button class="off" onclick="sendCmd('R2|OFF')">OFF</button>
</div>
</div>

<!-- R2 TEMP -->

<div class="card">
<h2>🌡 R2 Temperature</h2>

<span id="temp_r2" class="temp-display">
-- °C
</span>

<p style="text-align:center;color:#cbd5e1;">
DS18B20 Sensor
</p>
</div>

</div>

<div class="footer">

<br><br>

<div id="status">
🔄 Connecting MQTT...
</div>

</div>

</div>

<script>

const client = mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on('connect', () => {

console.log('MQTT Connected');

document.getElementById('status').innerHTML =
'🟢 MQTT Connected';

client.subscribe('ono_air_2026/status/r1/led1');
client.subscribe('ono_air_2026/status/r1/led2');

client.subscribe('ono_air_2026/status/r2');

client.subscribe('ono_air_2026/sensor/r1/temp');
client.subscribe('ono_air_2026/sensor/r2/temp');

});

client.on('message', (topic, message) => {

const value = message.toString();

console.log(topic, value);

// R1 LED1

if(topic === 'ono_air_2026/status/r1/led1')
{
document.getElementById('led1').innerHTML =
value === 'ON'
? '🟢 ON'
: '🔴 OFF';
}

// R1 LED2

if(topic === 'ono_air_2026/status/r1/led2')
{
document.getElementById('led2').innerHTML =
value === 'ON'
? '🟢 ON'
: '🔴 OFF';
}

// R2 OUTPUT

if(topic === 'ono_air_2026/status/r2')
{
document.getElementById('r2').innerHTML =
value === 'ON'
? '🟢 ON'
: '🔴 OFF';
}

// R1 TEMP

if(topic === 'ono_air_2026/sensor/r1/temp')
{
document.getElementById('temp_r1').innerHTML =
'🌡 ' + value + ' °C';
}

// R2 TEMP

if(topic === 'ono_air_2026/sensor/r2/temp')
{
document.getElementById('temp_r2').innerHTML =
'🌡 ' + value + ' °C';
}

});

client.on('error', (err) => {

console.log(err);

document.getElementById('status').innerHTML =
'🔴 MQTT Error';

});

client.on('offline', () => {

document.getElementById('status').innerHTML =
'🟠 MQTT Offline';

});

client.on('reconnect', () => {

document.getElementById('status').innerHTML =
'🟡 MQTT Reconnecting';

});

function sendCmd(cmd)
{
client.publish(
'ono_air_2026/cmd',
cmd
);

console.log('SEND', cmd);
}

</script>

</body>
</html>
