<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Air Control</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:50px;
}

button{
  width:150px;
  height:70px;
  font-size:24px;
  margin:10px;
}
</style>

</head>

<body>

<h1>Air Control</h1>

<button onclick="sendCmd('ON')">ON</button>
<button onclick="sendCmd('OFF')">OFF</button>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>

const client = mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on('connect', () => {
  console.log("MQTT Connected");
});

function sendCmd(cmd){
  client.publish('ono_air_2026/cmd', cmd);
  alert('ส่งคำสั่ง ' + cmd);
}

</script>

</body>
</html>
