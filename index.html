<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Air Control</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="container">

<div class="header">
<h1>🌡 Smart Air Control</h1>
<p>Room Monitoring System</p>
</div>
<div style="text-align:center;margin-top:20px;">
<h2>🌡 Gateway: <span id="temp_gateway">--</span> °C</h2>
</div>
<div class="rooms">

<!-- ROOM 1 -->
<div class="room">
<h2>ห้อง 1</h2>

<span id="led1" class="status">⚪ OFF</span>

<div class="btns">
<button class="on" onclick="sendCmd('R1|LED1_ON')">ON</button>
<button class="off" onclick="sendCmd('R1|LED1_OFF')">OFF</button>
</div>

<div class="temp" id="temp_r1">-- °C</div>
</div>

<!-- ROOM 2 -->
<div class="room">
<h2>ห้อง 2</h2>

<span id="r2" class="status">⚪ OFF</span>

<div class="btns">
<button class="on" onclick="sendCmd('R2|ON')">ON</button>
<button class="off" onclick="sendCmd('R2|OFF')">OFF</button>
</div>

<div class="temp" id="temp_r2">-- °C</div>
</div>

</div>



<div class="footer">
<br>
<div id="status">🔄 Connecting MQTT...</div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
