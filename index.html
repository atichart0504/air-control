<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ESP32 LED Control</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.container{
width:90%;
max-width:1000px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:38px;
}

.header p{
color:#cbd5e1;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-top:0;
text-align:center;
}

.status-led{
display:block;
text-align:center;
font-size:24px;
margin:15px 0;
font-weight:bold;
}

.btn-group{
display:flex;
gap:10px;
}

button{
flex:1;
border:none;
border-radius:12px;
padding:14px;
font-size:16px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.on{
background:#22c55e;
color:white;
}

.off{
background:#ef4444;
color:white;
}

.all{
background:#3b82f6;
color:white;
}

.footer{
margin-top:25px;
text-align:center;
}

#mqttStatus{
display:inline-block;
padding:10px 20px;
border-radius:50px;
background:#1e293b;
font-weight:bold;
}

</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

</head>

<body>
<div class="container">

<div class="header">
    <h1>🌡️ Smart Air Control</h1>
    <p>ESP32 + MQTT + LoRa Dashboard</p>
</div>

<div class="grid">

    <div class="card">
        <h2>LED 1</h2>
        <span id="led1" class="status-led">⚪ Unknown</span>

        <div class="btn-group">
            <button class="on" onclick="sendCmd('LED1_ON')">ON</button>
            <button class="off" onclick="sendCmd('LED1_OFF')">OFF</button>
        </div>
    </div>

    <div class="card">
        <h2>LED 2</h2>
        <span id="led2" class="status-led">⚪ Unknown</span>

        <div class="btn-group">
            <button class="on" onclick="sendCmd('LED2_ON')">ON</button>
            <button class="off" onclick="sendCmd('LED2_OFF')">OFF</button>
        </div>
    </div>

    <div class="card">
        <h2>LED 3</h2>
        <span id="led3" class="status-led">⚪ Unknown</span>

        <div class="btn-group">
            <button class="on" onclick="sendCmd('LED3_ON')">ON</button>
            <button class="off" onclick="sendCmd('LED3_OFF')">OFF</button>
        </div>
    </div>

</div>

<div class="footer">

    <br>

    <button class="all" onclick="sendCmd('ALL_ON')">
        ⚡ ALL ON
    </button>

    <button class="all" onclick="sendCmd('ALL_OFF')">
        🔌 ALL OFF
    </button>

    <br><br>

    <div id="status">
        🔄 Connecting MQTT...
    </div>

</div>

</div>


<script>

const client = mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on('connect', () => {

    console.log('MQTT Connected');

    document.getElementById('status').innerHTML =
        '🟢 MQTT Connected';

    client.subscribe('ono_air_2026/status/led1');
    client.subscribe('ono_air_2026/status/led2');
    client.subscribe('ono_air_2026/status/led3');
});

client.on('message', (topic, message) => {

    const value = message.toString();

    console.log(topic, value);

    if(topic === 'ono_air_2026/status/led1'){
        document.getElementById('led1').innerHTML =
            value === 'ON' ? '🟢 ON' : '🔴 OFF';
    }

    if(topic === 'ono_air_2026/status/led2'){
        document.getElementById('led2').innerHTML =
            value === 'ON' ? '🟢 ON' : '🔴 OFF';
    }

    if(topic === 'ono_air_2026/status/led3'){
        document.getElementById('led3').innerHTML =
            value === 'ON' ? '🟢 ON' : '🔴 OFF';
    }
});

client.on('error', (err) => {

    console.log('MQTT ERROR', err);

    document.getElementById('status').innerHTML =
        '🔴 MQTT Error';
});

client.on('offline', () => {

    console.log('MQTT OFFLINE');

    document.getElementById('status').innerHTML =
        '🟠 MQTT Offline';
});

client.on('reconnect', () => {

    console.log('MQTT Reconnecting');

    document.getElementById('status').innerHTML =
        '🟡 MQTT Reconnecting';
});

function sendCmd(cmd){

    client.publish(
        'ono_air_2026/cmd',
        cmd
    );

    console.log('SEND', cmd);
}

</script>

</body>
</html>
