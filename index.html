<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ESP32 LED Control</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:30px;
    background:#f5f5f5;
}

.container{
    display:inline-block;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

button{
    width:140px;
    height:60px;
    font-size:18px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.on{
    background:#4CAF50;
    color:white;
}

.off{
    background:#f44336;
    color:white;
}

.all{
    background:#2196F3;
    color:white;
}

.status-led{
    font-size:22px;
    font-weight:bold;
}

#status{
    margin-top:15px;
    font-weight:bold;
}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

</head>

<body>

<div class="container">

<h1>ESP32 LED Control</h1>

<h3>LED 1 : <span id="led1" class="status-led">⚪ Unknown</span></h3>
<button class="on" onclick="sendCmd('LED1_ON')">ON</button>
<button class="off" onclick="sendCmd('LED1_OFF')">OFF</button>

<h3>LED 2 : <span id="led2" class="status-led">⚪ Unknown</span></h3>
<button class="on" onclick="sendCmd('LED2_ON')">ON</button>
<button class="off" onclick="sendCmd('LED2_OFF')">OFF</button>

<h3>LED 3 : <span id="led3" class="status-led">⚪ Unknown</span></h3>
<button class="on" onclick="sendCmd('LED3_ON')">ON</button>
<button class="off" onclick="sendCmd('LED3_OFF')">OFF</button>

<hr>

<button class="all" onclick="sendCmd('ALL_ON')">ALL ON</button> <button class="all" onclick="sendCmd('ALL_OFF')">ALL OFF</button>

<br><br>

<div id="status">กำลังเชื่อมต่อ MQTT...</div>

</div>

<script>

const client = mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on('connect', () => {

    console.log('MQTT Connected');

    document.getElementById('status').innerHTML =
        '🟢 MQTT Connected';

    client.subscribe('ono_air_2026/status/led1');
    client.subscribe('ono_air_2026/status/led2');
    client.subscribe('ono_air_2026/status/led3');
});

client.on('message', (topic, message) => {

    const value = message.toString();

    console.log(topic, value);

    if(topic === 'ono_air_2026/status/led1'){
        document.getElementById('led1').innerHTML =
            value === 'ON' ? '🟢 ON' : '🔴 OFF';
    }

    if(topic === 'ono_air_2026/status/led2'){
        document.getElementById('led2').innerHTML =
            value === 'ON' ? '🟢 ON' : '🔴 OFF';
    }

    if(topic === 'ono_air_2026/status/led3'){
        document.getElementById('led3').innerHTML =
            value === 'ON' ? '🟢 ON' : '🔴 OFF';
    }
});

client.on('error', (err) => {

    console.log('MQTT ERROR', err);

    document.getElementById('status').innerHTML =
        '🔴 MQTT Error';
});

client.on('offline', () => {

    console.log('MQTT OFFLINE');

    document.getElementById('status').innerHTML =
        '🟠 MQTT Offline';
});

client.on('reconnect', () => {

    console.log('MQTT Reconnecting');

    document.getElementById('status').innerHTML =
        '🟡 MQTT Reconnecting';
});

function sendCmd(cmd){

    client.publish(
        'ono_air_2026/cmd',
        cmd
    );

    console.log('SEND', cmd);
}

</script>

</body>
</html>
