<div class="container">

<h1>ESP32 LED Control</h1>

<h3>LED 1 : <span id="led1">⚪ Unknown</span></h3>
<button class="on" onclick="sendCmd('LED1_ON')">ON</button>
<button class="off" onclick="sendCmd('LED1_OFF')">OFF</button>

<h3>LED 2 : <span id="led2">⚪ Unknown</span></h3>
<button class="on" onclick="sendCmd('LED2_ON')">ON</button>
<button class="off" onclick="sendCmd('LED2_OFF')">OFF</button>

<h3>LED 3 : <span id="led3">⚪ Unknown</span></h3>
<button class="on" onclick="sendCmd('LED3_ON')">ON</button>
<button class="off" onclick="sendCmd('LED3_OFF')">OFF</button>

<hr>

<button class="all" onclick="sendCmd('ALL_ON')">ALL ON</button> <button class="all" onclick="sendCmd('ALL_OFF')">ALL OFF</button>

<br><br>

<div id="status">กำลังเชื่อมต่อ MQTT...</div>

</div>

<script>

const client = mqtt.connect(
'wss://broker.hivemq.com:8884/mqtt'
);

client.on('connect', () => {

  document.getElementById('status').innerHTML =
    '🟢 MQTT Connected';

  client.subscribe('ono_air_2026/status/led1');
  client.subscribe('ono_air_2026/status/led2');
  client.subscribe('ono_air_2026/status/led3');

});

client.on('message', (topic, message) => {

  const value = message.toString();

  if(topic === 'ono_air_2026/status/led1'){

    document.getElementById('led1').innerHTML =
      value === 'ON'
      ? '🟢 ON'
      : '🔴 OFF';
  }

  if(topic === 'ono_air_2026/status/led2'){

    document.getElementById('led2').innerHTML =
      value === 'ON'
      ? '🟢 ON'
      : '🔴 OFF';
  }

  if(topic === 'ono_air_2026/status/led3'){

    document.getElementById('led3').innerHTML =
      value === 'ON'
      ? '🟢 ON'
      : '🔴 OFF';
  }

});

client.on('error', () => {

  document.getElementById('status').innerHTML =
    '🔴 MQTT Error';

});

function sendCmd(cmd){

  client.publish(
    'ono_air_2026/cmd',
    cmd
  );

}

</script>
